<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🎹 피아노 코드 암기</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --root-key: #4f46e5;
    --chord-key: #7c3aed;
    --text: #eee;
    --muted: #888;
    --border: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    overscroll-behavior: none;
  }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 32px;
  }

  h1 {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    margin-bottom: 4px;
    color: #fff;
    letter-spacing: 1px;
  }

  .subtitle {
    color: var(--muted);
    font-size: clamp(0.78rem, 3vw, 0.9rem);
    margin-bottom: 16px;
    text-align: center;
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    width: 100%;
    max-width: 400px;
  }
  .tab {
    flex: 1;
    padding: 11px 8px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: transparent;
    color: #ccc;
    cursor: pointer;
    font-size: clamp(0.85rem, 3.5vw, 0.95rem);
    font-weight: 600;
    transition: all .2s;
    touch-action: manipulation;
    min-height: 44px;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── 패널 ── */
  .panel { display: none; width: 100%; max-width: 860px; }
  .panel.active { display: flex; flex-direction: column; align-items: center; }

  /* ── 코드 카드 ── */
  .chord-card {
    background: var(--card);
    border: 2px solid #6c63ff44;
    border-radius: 16px;
    padding: 18px 16px;
    text-align: center;
    margin-bottom: 14px;
    width: 100%;
  }
  .chord-name {
    font-size: clamp(2rem, 8vw, 2.6rem);
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.1;
  }
  .chord-type { font-size: clamp(0.82rem, 3.2vw, 1rem); color: var(--muted); margin-top: 4px; }
  .chord-notes {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .note-pill {
    background: #6c63ff33;
    border: 1px solid #6c63ff88;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: clamp(0.78rem, 3vw, 0.95rem);
    color: #c4b5fd;
  }
  .chord-formula { color: #555; font-size: clamp(0.75rem, 2.8vw, 0.85rem); margin-top: 8px; }

  /* ── 암기 팁 ── */
  .tip-box {
    margin-top: 14px;
    background: #0f172a;
    border: 1px solid #6c63ff55;
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: left;
  }
  .tip-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .tip-text {
    font-size: clamp(0.8rem, 3vw, 0.9rem);
    color: #c4b5fd;
    line-height: 1.6;
  }
  .tip-text em {
    font-style: normal;
    color: #fff;
    font-weight: 600;
  }
  .tip-text .dim-note {
    color: #f87171;
    font-weight: 600;
  }
  .tip-text .up-note {
    color: #34d399;
    font-weight: 600;
  }

  /* ── 피아노 ── */
  .piano-wrap {
    overflow-x: auto;
    overflow-y: hidden;
    width: 100%;
    padding: 10px 0 16px;
    display: flex;
    justify-content: center;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .piano-wrap::-webkit-scrollbar { display: none; }
  .piano {
    position: relative;
    display: flex;
    flex-shrink: 0;
    user-select: none;
  }
  .white-key {
    height: clamp(100px, 28vw, 160px);
    background: #f5f5f0;
    border: 1px solid #bbb;
    border-radius: 0 0 6px 6px;
    position: relative;
    cursor: pointer;
    transition: background .1s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
    font-size: clamp(0.5rem, 1.5vw, 0.7rem);
    color: #999;
    font-weight: 600;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .white-key.highlight {
    background: var(--chord-key) !important;
    color: #fff;
    border-color: #5b21b6;
  }
  .white-key.root {
    background: var(--root-key) !important;
    color: #fff;
    border-color: #3730a3;
  }
  .black-key {
    background: #1a1a1a;
    border: 1px solid #000;
    border-radius: 0 0 4px 4px;
    position: absolute;
    top: 0;
    z-index: 2;
    cursor: pointer;
    transition: background .1s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 5px;
    font-size: clamp(0.45rem, 1.3vw, 0.6rem);
    color: #666;
    font-weight: 600;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .black-key.highlight {
    background: var(--chord-key) !important;
    color: #fff;
  }
  .black-key.root {
    background: var(--root-key) !important;
    color: #fff;
  }

  /* ── 탐색 버튼 ── */
  .nav-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
    width: 100%;
    justify-content: center;
  }
  .btn {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: clamp(0.88rem, 3.5vw, 0.95rem);
    font-weight: 600;
    transition: all .15s;
    touch-action: manipulation;
    min-height: 44px;
    min-width: 44px;
  }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-primary:active { background: #5a52e0; }
  .btn-secondary { background: #2d2d4e; color: #ccc; }
  .btn-secondary:active { background: #3d3d6e; }
  .btn-wide { flex: 1; max-width: 180px; }

  .chord-counter { color: var(--muted); font-size: 0.9rem; min-width: 70px; text-align: center; }

  /* ── 필터 (가로 스크롤) ── */
  .filter-scroll {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 4px 0 10px;
    margin-bottom: 6px;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-row {
    display: flex;
    gap: 8px;
    width: max-content;
    padding: 0 4px;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all .15s;
    white-space: nowrap;
    touch-action: manipulation;
    min-height: 36px;
  }
  .filter-btn.active {
    background: #6c63ff33;
    border-color: #6c63ff88;
    color: #c4b5fd;
  }

  /* ── 퀴즈 ── */
  .quiz-prompt {
    font-size: clamp(0.95rem, 3.5vw, 1.1rem);
    color: #aaa;
    margin-bottom: 6px;
    text-align: center;
  }
  .quiz-feedback {
    font-size: clamp(0.95rem, 3.5vw, 1.1rem);
    font-weight: 700;
    min-height: 26px;
    margin-bottom: 10px;
    text-align: center;
  }
  .feedback-correct { color: #10b981; }
  .feedback-wrong   { color: #ef4444; }

  /* 퀴즈 선택지 */
  .choices-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 500px;
    margin-bottom: 14px;
  }
  .choice-btn {
    padding: 14px 8px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--card);
    color: #ddd;
    cursor: pointer;
    font-size: clamp(0.88rem, 3.5vw, 1rem);
    font-weight: 600;
    transition: all .15s;
    text-align: center;
    min-height: 64px;
    touch-action: manipulation;
    line-height: 1.3;
  }
  .choice-btn:active:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
  .choice-btn.correct { border-color: #10b981; background: #10b98122; color: #10b981; }
  .choice-btn.wrong   { border-color: #ef4444; background: #ef444422; color: #ef4444; }
  .choice-btn:disabled { opacity: 0.7; cursor: default; }

  /* ── 진행 바 ── */
  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #2d2d4e;
    border-radius: 4px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width .4s;
  }

  /* ── 스코어 ── */
  .score-display {
    display: flex;
    gap: 24px;
    margin-bottom: 14px;
  }
  .score-item { text-align: center; }
  .score-num   { font-size: clamp(1.4rem, 6vw, 1.8rem); font-weight: 700; }
  .score-label { font-size: 0.72rem; color: var(--muted); }
  .score-correct { color: #10b981; }
  .score-wrong   { color: #ef4444; }
  .score-total   { color: var(--accent2); }

  /* ── 결과 화면 ── */
  .result-card {
    background: var(--card);
    border: 2px solid #6c63ff44;
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    width: 100%;
    max-width: 420px;
  }
  .result-emoji { font-size: 3rem; margin-bottom: 10px; }
  .result-title { font-size: 1.5rem; font-weight: 700; color: var(--accent2); margin-bottom: 8px; }
  .result-desc  { color: var(--muted); margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5; }
  .result-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 24px; }

  /* ── 범례 ── */
  .legend {
    display: flex;
    gap: 14px;
    font-size: clamp(0.72rem, 2.8vw, 0.8rem);
    color: var(--muted);
    margin-bottom: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-root  { background: var(--root-key); }
  .legend-chord { background: var(--chord-key); }
  .legend-white { background: #f5f5f0; border: 1px solid #bbb; }

  /* ── 스와이프 힌트 ── */
  .swipe-hint {
    font-size: 0.75rem;
    color: #444;
    margin-top: -8px;
    margin-bottom: 10px;
  }

  /* ── 반응형 ── */
  @media (min-width: 600px) {
    .tab:hover    { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn:hover { background: #6c63ff33; border-color: #6c63ff88; color: #c4b5fd; }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
  }

  #quiz-area, #quiz-result {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @media (max-width: 380px) {
    body { padding: 12px 8px 28px; }
    .chord-card { padding: 14px 12px; }
  }
</style>
</head>
<body>

<h1>🎹 피아노 코드 암기</h1>
<p class="subtitle">피아노 코드를 보고 외우고 퀴즈로 확인하세요</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('study')">📖 학습 모드</button>
  <button class="tab" onclick="switchTab('quiz')">🎯 퀴즈 모드</button>
</div>

<!-- ══════════════ 학습 모드 ══════════════ -->
<div id="panel-study" class="panel active">
  <div class="filter-scroll"><div class="filter-row" id="study-filters"></div></div>

  <div class="chord-card">
    <div class="chord-name" id="study-chord-name">C</div>
    <div class="chord-type" id="study-chord-type">장조 (Major)</div>
    <div class="chord-notes" id="study-chord-notes"></div>
    <div class="chord-formula" id="study-chord-formula"></div>
    <div class="tip-box" id="study-tip">
      <div class="tip-label">💡 암기 팁</div>
      <div class="tip-text" id="study-tip-text"></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot legend-root"></div>근음 (Root)</div>
    <div class="legend-item"><div class="legend-dot legend-chord"></div>구성음</div>
    <div class="legend-item"><div class="legend-dot legend-white"></div>일반</div>
  </div>

  <div class="piano-wrap" id="study-piano-wrap">
    <div class="piano" id="study-piano"></div>
  </div>
  <p class="swipe-hint" id="study-swipe-hint"></p>

  <div class="nav-row">
    <button class="btn btn-secondary btn-wide" onclick="studyPrev()">◀ 이전</button>
    <span class="chord-counter" id="study-counter">1 / 96</span>
    <button class="btn btn-primary btn-wide" onclick="studyNext()">다음 ▶</button>
  </div>

  <div class="nav-row">
    <button class="btn btn-secondary" onclick="studyShuffle()">🔀 랜덤</button>
  </div>
</div>

<!-- ══════════════ 퀴즈 모드 ══════════════ -->
<div id="panel-quiz" class="panel">
  <div id="quiz-area">
    <div class="score-display">
      <div class="score-item"><div class="score-num score-correct" id="q-correct">0</div><div class="score-label">정답</div></div>
      <div class="score-item"><div class="score-num score-wrong"   id="q-wrong">0</div><div class="score-label">오답</div></div>
      <div class="score-item"><div class="score-num score-total"   id="q-total">0</div><div class="score-label">남은 문제</div></div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="q-progress" style="width:0%"></div>
    </div>

    <div class="filter-scroll"><div class="filter-row" id="quiz-filters"></div></div>

    <p class="quiz-prompt">이 코드의 이름은?</p>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot legend-root"></div>근음 (Root)</div>
      <div class="legend-item"><div class="legend-dot legend-chord"></div>구성음</div>
    </div>

    <div class="piano-wrap" id="quiz-piano-wrap">
      <div class="piano" id="quiz-piano"></div>
    </div>

    <div class="quiz-feedback" id="q-feedback"></div>

    <div class="choices-grid" id="q-choices"></div>

    <div class="nav-row">
      <button class="btn btn-primary btn-wide" id="q-next-btn" onclick="quizNext()" style="display:none">다음 문제 ▶</button>
    </div>
  </div>

  <div id="quiz-result" style="display:none">
    <div class="result-card">
      <div class="result-emoji" id="res-emoji">🎉</div>
      <div class="result-title" id="res-title">완료!</div>
      <div class="result-desc"  id="res-desc"></div>
      <div class="result-stats">
        <div class="score-item"><div class="score-num score-correct" id="res-correct">0</div><div class="score-label">정답</div></div>
        <div class="score-item"><div class="score-num score-wrong"   id="res-wrong">0</div><div class="score-label">오답</div></div>
      </div>
      <button class="btn btn-primary" onclick="quizRestart()">다시 하기</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  코드 데이터
// ═══════════════════════════════════════════════
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_KR = {
  'C':'도','C#':'도#','D':'레','D#':'레#','E':'미',
  'F':'파','F#':'파#','G':'솔','G#':'솔#','A':'라','A#':'라#','B':'시'
};

const CHORD_TYPES = [
  { id:'maj',  label:'장조 (Major)',          formula:'1 - 3 - 5',        intervals:[0,4,7] },
  { id:'min',  label:'단조 (Minor)',          formula:'1 - ♭3 - 5',       intervals:[0,3,7] },
  { id:'dim',  label:'감화음 (Diminished)',   formula:'1 - ♭3 - ♭5',      intervals:[0,3,6] },
  { id:'aug',  label:'증화음 (Augmented)',    formula:'1 - 3 - #5',       intervals:[0,4,8] },
  { id:'7',    label:'도미넌트 세븐 (Dom 7)', formula:'1 - 3 - 5 - ♭7',   intervals:[0,4,7,10] },
  { id:'maj7', label:'메이저 세븐 (Maj7)',    formula:'1 - 3 - 5 - 7',    intervals:[0,4,7,11] },
  { id:'min7', label:'마이너 세븐 (Min7)',    formula:'1 - ♭3 - 5 - ♭7',  intervals:[0,3,7,10] },
  { id:'sus4', label:'서스4 (Sus4)',          formula:'1 - 4 - 5',        intervals:[0,5,7] },
];

const ROOT_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// ═══════════════════════════════════════════════
//  암기 팁 생성
// ═══════════════════════════════════════════════
function getMemoryTip(chord) {
  const r  = chord.root;          // 예: "C"
  const rk = NOTE_KR[r];          // 예: "도"
  const n  = chord.notes;         // 구성음 배열

  // 3음 (index 1), 5음 (index 2), 7음 (index 3)
  const third = n[1], fifth = n[2], seventh = n[3];
  const thirdKr = NOTE_KR[third];
  const fifthKr = fifth ? NOTE_KR[fifth] : '';
  const sevKr   = seventh ? NOTE_KR[seventh] : '';

  switch (chord.typeId) {
    case 'maj':
      return `<em>${r} 장조의 기본형</em>입니다.<br>
              근음 <em>${rk}(${r})</em>에서 <span class="up-note">장3도(4반음) 위</span> <em>${thirdKr}(${third})</em>,
              다시 <span class="up-note">단3도(3반음) 위</span> <em>${fifthKr}(${fifth})</em>.`;

    case 'min':
      return `<em>${r} 장조</em>에서 <span class="dim-note">3음을 반음 하나 내리면</span> 됩니다.<br>
              <em>${rk}(${r})</em> → <span class="dim-note">${thirdKr}(${third})</span> → <em>${fifthKr}(${fifth})</em><br>
              장조와 5음은 같고, <span class="dim-note">중간 음(3음)만</span> 반음 낮아집니다.`;

    case 'dim':
      return `<em>${r}m (단조)</em>에서 <span class="dim-note">5음을 반음 하나 더 내리면</span> 됩니다.<br>
              <em>${rk}(${r})</em> → <span class="dim-note">${thirdKr}(${third})</span> → <span class="dim-note">${fifthKr}(${fifth})</span><br>
              단조에서 5음까지 줄여 <span class="dim-note">반음 간격 3+3</span>으로 이루어집니다.`;

    case 'aug':
      return `<em>${r} 장조</em>에서 <span class="up-note">5음을 반음 하나 올리면</span> 됩니다.<br>
              <em>${rk}(${r})</em> → <em>${thirdKr}(${third})</em> → <span class="up-note">${fifthKr}(${fifth})</span><br>
              장조에서 5음만 올려 <span class="up-note">장3도 간격 4+4</span>로 대칭을 이룹니다.`;

    case '7':
      return `<em>${r} 장조(1·3·5)</em>에 <span class="dim-note">단7도를 추가</span>한 코드입니다.<br>
              <em>${rk}(${r})</em> · <em>${thirdKr}(${third})</em> · <em>${fifthKr}(${fifth})</em> + <span class="dim-note">${sevKr}(${seventh})</span><br>
              <em>${r} 장조</em>의 으뜸음에서 <span class="dim-note">10반음 위(단7도)</span>가 추가됩니다.`;

    case 'maj7':
      return `<em>${r} 장조(1·3·5)</em>에 <span class="up-note">장7도를 추가</span>한 코드입니다.<br>
              <em>${rk}(${r})</em> · <em>${thirdKr}(${third})</em> · <em>${fifthKr}(${fifth})</em> + <span class="up-note">${sevKr}(${seventh})</span><br>
              <em>7코드</em>보다 7음이 반음 <span class="up-note">더 높습니다</span> — 한 음 낮은 으뜸음으로 기억하세요.`;

    case 'min7':
      return `<em>${r}m (단조)</em>에 <span class="dim-note">단7도를 추가</span>한 코드입니다.<br>
              <em>${rk}(${r})</em> · <span class="dim-note">${thirdKr}(${third})</span> · <em>${fifthKr}(${fifth})</em> + <span class="dim-note">${sevKr}(${seventh})</span><br>
              <em>${r}7</em>에서 <span class="dim-note">3음을 반음 낮춘 것</span>과 같습니다.`;

    case 'sus4':
      return `<em>${r} 장조</em>에서 <span class="up-note">3음을 반음 올려 4음으로</span> 바꾼 코드입니다.<br>
              <em>${rk}(${r})</em> → <span class="up-note">${thirdKr}(${third})</span>(4음) → <em>${fifthKr}(${fifth})</em><br>
              3음이 없어 장·단조 색깔이 없고 <span class="up-note">긴장감·개방감</span>을 줍니다.`;

    default: return '';
  }
}

const ALL_CHORDS = [];
for (const root of ROOT_NOTES) {
  for (const ct of CHORD_TYPES) {
    const rootIdx = NOTES.indexOf(root);
    const noteNames = ct.intervals.map(i => NOTES[(rootIdx + i) % 12]);
    const suffix = ct.id==='maj'?'':ct.id==='min'?'m':ct.id==='dim'?'dim':
      ct.id==='aug'?'aug':ct.id==='7'?'7':ct.id==='maj7'?'maj7':
      ct.id==='min7'?'m7':'sus4';
    ALL_CHORDS.push({ name:root+suffix, root, typeId:ct.id,
      typeLabel:ct.label, formula:ct.formula, notes:noteNames });
  }
}

// ═══════════════════════════════════════════════
//  피아노 렌더 (반응형 키 너비)
// ═══════════════════════════════════════════════
const WHITE_KEYS = ['C','D','E','F','G','A','B'];
const BLACK_MAP  = { C:'C#', D:'D#', F:'F#', G:'G#', A:'A#' };

function calcKeyWidth(wrapId) {
  const wrap = document.getElementById(wrapId);
  const available = (wrap ? wrap.clientWidth : window.innerWidth) - 4;
  const totalWhite = WHITE_KEYS.length * 2; // 2 octaves = 14
  const w = Math.max(22, Math.floor(available / totalWhite));
  return w;
}

function buildPiano(containerId, highlightNotes, rootNote) {
  const pianoEl = document.getElementById(containerId);
  const wrapId  = containerId; // used for size calc
  pianoEl.innerHTML = '';

  const W = calcKeyWidth(containerId + '-wrap') || 30;
  const BW = Math.round(W * 0.62);
  const BH = Math.round(W * 2.3);
  const WH_val = Math.round(W * 3.6);

  // Apply height via CSS variable trick — just set inline on piano
  pianoEl.style.setProperty('--wh', WH_val + 'px');
  pianoEl.style.setProperty('--bh', BH + 'px');

  let whiteIndex = 0;
  for (let oct = 0; oct < 2; oct++) {
    for (const wn of WHITE_KEYS) {
      const isHL = highlightNotes.includes(wn);
      const isR  = wn === rootNote;

      const wKey = document.createElement('div');
      wKey.className = 'white-key' + (isR ? ' root' : isHL ? ' highlight' : '');
      wKey.style.cssText = `width:${W}px;height:${WH_val}px;font-size:${Math.max(8,W*0.28)}px`;
      wKey.title = NOTE_KR[wn] + ' (' + wn + ')';
      wKey.textContent = wn;
      pianoEl.appendChild(wKey);

      if (BLACK_MAP[wn]) {
        const bn  = BLACK_MAP[wn];
        const isBH = highlightNotes.includes(bn);
        const iBR  = bn === rootNote;

        const bKey = document.createElement('div');
        bKey.className = 'black-key' + (iBR ? ' root' : isBH ? ' highlight' : '');
        bKey.style.cssText =
          `width:${BW}px;height:${BH}px;` +
          `left:${(whiteIndex+1)*W - Math.round(BW/2)}px;` +
          `font-size:${Math.max(7,BW*0.28)}px`;
        bKey.title = NOTE_KR[bn] + ' (' + bn + ')';
        bKey.textContent = bn;
        pianoEl.appendChild(bKey);
      }
      whiteIndex++;
    }
  }
  pianoEl.style.width = (whiteIndex * W) + 'px';
}

// ── 리사이즈 시 피아노 재렌더
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentPanel === 'study') renderStudy();
    else renderQuiz();
  }, 150);
});

// ═══════════════════════════════════════════════
//  스와이프 제스처
// ═══════════════════════════════════════════════
function addSwipe(el, onLeft, onRight) {
  let sx = 0, sy = 0;
  el.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      dx < 0 ? onLeft() : onRight();
    }
  }, { passive: true });
}

// ═══════════════════════════════════════════════
//  탭 전환
// ═══════════════════════════════════════════════
let currentPanel = 'study';

function switchTab(name) {
  currentPanel = name;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['study','quiz'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'quiz') initQuiz();
  else renderStudy();
}

// ═══════════════════════════════════════════════
//  학습 모드
// ═══════════════════════════════════════════════
let studyFilter = 'all';
let studyList   = [...ALL_CHORDS];
let studyIdx    = 0;

function buildStudyFilters() {
  const row = document.getElementById('study-filters');
  row.innerHTML = '';
  const filters = [['all','전체'], ...CHORD_TYPES.map(ct => [ct.id, ct.id.toUpperCase()])];
  for (const [id, label] of filters) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (id === studyFilter ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      studyFilter = id;
      studyList = id === 'all' ? [...ALL_CHORDS] : ALL_CHORDS.filter(c => c.typeId === id);
      studyIdx = 0;
      buildStudyFilters();
      renderStudy();
    };
    row.appendChild(btn);
  }
}

function renderStudy() {
  const chord = studyList[studyIdx];
  document.getElementById('study-chord-name').textContent    = chord.name;
  document.getElementById('study-chord-type').textContent    = chord.typeLabel;
  document.getElementById('study-chord-formula').textContent = '구성 음정: ' + chord.formula;
  document.getElementById('study-counter').textContent       = (studyIdx+1) + ' / ' + studyList.length;

  const notesWrap = document.getElementById('study-chord-notes');
  notesWrap.innerHTML = '';
  chord.notes.forEach(n => {
    const pill = document.createElement('span');
    pill.className = 'note-pill';
    pill.textContent = NOTE_KR[n] + ' (' + n + ')';
    notesWrap.appendChild(pill);
  });

  document.getElementById('study-tip-text').innerHTML = getMemoryTip(chord);

  buildPiano('study-piano', chord.notes, chord.root);
}

function studyNext()    { studyIdx = (studyIdx+1) % studyList.length; renderStudy(); }
function studyPrev()    { studyIdx = (studyIdx-1+studyList.length) % studyList.length; renderStudy(); }
function studyShuffle() { studyIdx = Math.floor(Math.random() * studyList.length); renderStudy(); }

// ═══════════════════════════════════════════════
//  퀴즈 모드
// ═══════════════════════════════════════════════
let quizFilter   = 'all';
let quizPool     = [];
let quizIdx      = 0;
let quizCorrect  = 0;
let quizWrong    = 0;
let quizAnswered = false;

function buildQuizFilters() {
  const row = document.getElementById('quiz-filters');
  row.innerHTML = '';
  const filters = [['all','전체'], ...CHORD_TYPES.map(ct => [ct.id, ct.id.toUpperCase()])];
  for (const [id, label] of filters) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (id === quizFilter ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { quizFilter = id; buildQuizFilters(); quizRestart(); };
    row.appendChild(btn);
  }
}

function buildQuizPool() {
  const base = quizFilter === 'all' ? ALL_CHORDS : ALL_CHORDS.filter(c => c.typeId === quizFilter);
  quizPool = [...base].sort(() => Math.random() - 0.5);
}

function initQuiz() {
  buildQuizFilters();
  buildQuizPool();
  quizIdx = quizCorrect = quizWrong = 0;
  document.getElementById('quiz-area').style.display   = '';
  document.getElementById('quiz-result').style.display = 'none';
  renderQuiz();
}

function renderQuiz() {
  if (quizIdx >= quizPool.length) { showResult(); return; }

  quizAnswered = false;
  const chord = quizPool[quizIdx];

  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-wrong').textContent   = quizWrong;
  document.getElementById('q-total').textContent   = quizPool.length - quizIdx;
  document.getElementById('q-progress').style.width = (quizIdx / quizPool.length * 100).toFixed(1) + '%';

  buildPiano('quiz-piano', chord.notes, chord.root);

  document.getElementById('q-feedback').textContent = '';
  document.getElementById('q-feedback').className   = 'quiz-feedback';
  document.getElementById('q-next-btn').style.display = 'none';

  const pool   = quizFilter === 'all' ? ALL_CHORDS : ALL_CHORDS.filter(c => c.typeId === quizFilter);
  const wrongs = pool.filter(c => c.name !== chord.name).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...wrongs, chord].sort(() => Math.random() - 0.5);

  const grid = document.getElementById('q-choices');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span style="font-size:1.15rem;display:block">${c.name}</span><span style="font-size:0.72rem;color:#888;display:block;margin-top:2px">${c.typeLabel}</span>`;
    btn.onclick = () => checkAnswer(c.name === chord.name, chord, btn, grid);
    grid.appendChild(btn);
  });
}

function checkAnswer(correct, chord, clickedBtn, grid) {
  if (quizAnswered) return;
  quizAnswered = true;

  grid.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.querySelector('span').textContent === chord.name) b.classList.add('correct');
  });

  if (correct) {
    quizCorrect++;
    const fb = document.getElementById('q-feedback');
    fb.textContent = '✅ 정답!';
    fb.className   = 'quiz-feedback feedback-correct';
  } else {
    quizWrong++;
    clickedBtn.classList.add('wrong');
    const fb = document.getElementById('q-feedback');
    fb.textContent = '❌ 오답! 정답: ' + chord.name;
    fb.className   = 'quiz-feedback feedback-wrong';
  }

  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-wrong').textContent   = quizWrong;
  document.getElementById('q-next-btn').style.display = '';
}

function quizNext() { quizIdx++; renderQuiz(); }

function quizRestart() {
  buildQuizPool();
  quizIdx = quizCorrect = quizWrong = 0;
  document.getElementById('quiz-area').style.display   = '';
  document.getElementById('quiz-result').style.display = 'none';
  renderQuiz();
}

function showResult() {
  document.getElementById('quiz-area').style.display   = 'none';
  document.getElementById('quiz-result').style.display = '';

  const total = quizCorrect + quizWrong;
  const pct   = total ? Math.round(quizCorrect / total * 100) : 0;

  document.getElementById('res-correct').textContent = quizCorrect;
  document.getElementById('res-wrong').textContent   = quizWrong;

  let emoji, title, desc;
  if      (pct===100) { emoji='🏆'; title='완벽해요!';     desc='모든 코드를 맞혔어요! 대단합니다!'; }
  else if (pct>= 80)  { emoji='🎉'; title='훌륭해요!';     desc=`정답률 ${pct}% — 조금만 더 연습하면 완벽해질 거예요!`; }
  else if (pct>= 60)  { emoji='👍'; title='잘 했어요!';    desc=`정답률 ${pct}% — 틀린 코드를 학습 모드에서 복습해 보세요.`; }
  else                { emoji='💪'; title='계속 연습해요!'; desc=`정답률 ${pct}% — 학습 모드로 돌아가서 코드를 다시 공부해 보세요.`; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-desc').textContent  = desc;
}

// ═══════════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════════
buildStudyFilters();
renderStudy();

// 학습 모드 스와이프
addSwipe(document.getElementById('panel-study'), studyNext, studyPrev);

// 모바일에서 스와이프 힌트 표시
if ('ontouchstart' in window) {
  document.getElementById('study-swipe-hint').textContent = '← 좌우로 스와이프해서 이동 →';
}
</script>
